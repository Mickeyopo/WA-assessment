        <h2>Adoption form</h2>
        <form>
            <label>Full Name:</label><br>
            <input type="text" name="Full Name"><br><br>
        <label>Email:</label><br>
        <input type="email" name="email"><br><br>
        <label>Age:</label><br>
        <input type="number" name="age"><br><br>
        
            <label>Choose a pet:</label> <br>
            <input type="checkbox"> Dog <br>
            <input type="checkbox"> Cat <br>
            <input type="checkbox"> Parrot <br>
            <input type="checkbox"> Pig <br><br>

            <label>Select the preffered gender:</label> <br>
            <input type="radio" name="Male"> Male <br>
            <input type="radio" name="Female"> Female <br><br>
            
            <label>Describe the pet you want to adopt eg. breed, colour</label><br>
            <textarea rows="5" cols="30"></textarea> <br><br>

            <label>Choose a service:</label><br>
        <select>
           <option>Vaccination</option>
           <option>Cleaning</option>
           <option>Training</option>
           <option>Pet food and treats</option>
        </select> <br><br>

        <input type="submit" value="SUBMIT">
    </form> <br>
    <footer>
        <p>Thank you for providing a shelter for the beloved pets</p>
    </footer>
    </body>
